<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <title>Lecteur Sonore</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:     #C4601D;
      --accent-dim: #7A3010;
      --bg:         #0a0a0f;
      --text:       rgba(255,255,255,0.90);
      --text-dim:   rgba(255,255,255,0.45);
      --font-serif: Georgia, 'Times New Roman', serif;
      --font-sans:  -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --transition: 1.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }

    /* ── Background glow ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 100%, var(--accent-dim) 0%, transparent 70%);
      opacity: 0.35;
      transition: background var(--transition);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
    }

    /* ── Header ── */
    #header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 24px 0;
      flex-shrink: 0;
    }

    #book-title {
      font-family: var(--font-serif);
      font-size: clamp(12px, 2.5vw, 14px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── Chapter block ── */
    #chapter-block {
      flex-shrink: 0;
      text-align: center;
      padding: 18px 32px 0;
      transition: opacity 0.5s;
    }

    #chapter-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
      transition: color var(--transition);
    }

    #chapter-title {
      font-family: var(--font-serif);
      font-size: clamp(20px, 5vw, 28px);
      line-height: 1.2;
      font-weight: normal;
    }

    /* ── Central visual zone ── */
    #visual-zone {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
      min-height: 0;
    }

    /* Tap button (main interaction) */
    #tap-btn {
      position: relative;
      width: clamp(120px, 35vw, 160px);
      height: clamp(120px, 35vw, 160px);
      border-radius: 50%;
      background: transparent;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      z-index: 10;
    }

    /* Pulsing rings behind the button */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--accent);
      opacity: 0;
      animation: ring-pulse 3s ease-out infinite;
      transition: border-color var(--transition);
    }
    .ring:nth-child(1) { width: 100%; height: 100%; animation-delay: 0s; }
    .ring:nth-child(2) { width: 140%; height: 140%; animation-delay: 0.8s; }
    .ring:nth-child(3) { width: 185%; height: 185%; animation-delay: 1.6s; }
    .ring:nth-child(4) { width: 235%; height: 235%; animation-delay: 2.4s; }

    @keyframes ring-pulse {
      0%   { transform: scale(0.85); opacity: 0; }
      20%  { opacity: 0.5; }
      100% { transform: scale(1.05); opacity: 0; }
    }

    /* Inner circle (solid fill behind icon) */
    .inner-circle {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 70%);
      border: 1.5px solid rgba(255,255,255,0.15);
      transition: transform 0.12s, background 0.3s;
    }

    #tap-btn:active .inner-circle {
      transform: scale(0.93);
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.04) 70%);
    }

    /* Mic icon */
    .mic-icon {
      position: relative;
      z-index: 2;
      width: 28px;
      height: 28px;
      color: rgba(255,255,255,0.85);
    }

    .tap-label {
      position: relative;
      z-index: 2;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* When paused (before first tap) */
    body.paused .ring { animation-play-state: paused; }
    body.paused .ring { opacity: 0; }

    /* ── Description ── */
    #description {
      flex-shrink: 0;
      text-align: center;
      padding: 0 32px 12px;
      font-family: var(--font-serif);
      font-size: clamp(14px, 3.5vw, 16px);
      line-height: 1.7;
      color: var(--text-dim);
      font-style: italic;
      max-width: 380px;
      transition: opacity 0.5s;
    }

    /* ── Progress bar ── */
    #progress-zone {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 32px 28px;
    }

    #progress-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.4s, transform 0.4s;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.3);
      transition: background var(--transition), transform 0.4s;
    }

    .dot.done {
      background: rgba(255,255,255,0.45);
    }

    #page-count {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      min-width: 36px;
      text-align: right;
    }

    /* ── Start overlay (avant le premier tap) ── */
    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(10,10,15,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: opacity 0.6s;
    }

    #start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .start-book-title {
      font-family: var(--font-serif);
      font-size: clamp(22px, 5vw, 30px);
      text-align: center;
      padding: 0 32px;
    }

    .start-subtitle {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .start-btn {
      margin-top: 16px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: start-pulse 2s ease-in-out infinite;
    }

    @keyframes start-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(196,96,29,0.4); }
      50%       { box-shadow: 0 0 0 20px rgba(196,96,29,0); }
    }

    .start-hint {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    /* ── End screen ── */
    #end-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(10,10,15,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s;
    }

    #end-screen.visible {
      opacity: 1;
      pointer-events: all;
    }

    .end-title {
      font-family: var(--font-serif);
      font-size: clamp(24px, 5vw, 32px);
      text-align: center;
      padding: 0 32px;
    }

    .end-sub {
      font-size: 14px;
      color: var(--text-dim);
      text-align: center;
      padding: 0 32px;
      font-style: italic;
    }

    .restart-btn {
      margin-top: 20px;
      padding: 14px 36px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.25);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
    }

    .restart-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.5);
    }

    /* ── Transitions de contenu ── */
    .fade-out { opacity: 0 !important; }

    /* ── Indicator "playing" (cercle respirant dans le bouton) ── */
    @keyframes breath {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }
    body.playing #tap-btn .inner-circle {
      animation: breath 3s ease-in-out infinite;
    }
  </style>
</head>
<body class="paused">

  <!-- Overlay de démarrage -->
  <div id="start-overlay">
    <p class="start-subtitle">Ambiance sonore</p>
    <h1 class="start-book-title" id="overlay-title">—</h1>
    <button class="start-btn" aria-label="Démarrer">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <p class="start-hint">Touchez pour commencer</p>
  </div>

  <!-- Écran de fin -->
  <div id="end-screen">
    <p class="start-subtitle">Fin du livre</p>
    <h2 class="end-title">L'aventure est terminée.</h2>
    <p class="end-sub">Merci d'avoir voyagé avec nous.</p>
    <button class="restart-btn" id="restart-btn">Recommencer</button>
  </div>

  <!-- Application principale -->
  <div id="app">
    <header id="header">
      <span id="book-title">—</span>
    </header>

    <div id="chapter-block">
      <div id="chapter-label">—</div>
      <h2 id="chapter-title">—</h2>
    </div>

    <div id="visual-zone">
      <button id="tap-btn" aria-label="Passer à la page suivante">
        <span class="ring"></span>
        <span class="ring"></span>
        <span class="ring"></span>
        <span class="ring"></span>
        <div class="inner-circle"></div>
        <!-- Icône micro -->
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9"  y1="22" x2="15" y2="22"/>
        </svg>
        <span class="tap-label">toucher</span>
      </button>
    </div>

    <p id="description">—</p>

    <div id="progress-zone">
      <div id="progress-dots"></div>
      <span id="page-count">1/1</span>
    </div>
  </div>

  <script src="data/books.js"></script>
  <script src="js/audio.js"></script>
  <script>
    /* ── Lecture des paramètres URL ── */
    const params   = new URLSearchParams(location.search);
    const bookId   = parseInt(params.get('book')  || '1', 10);
    const startId  = parseInt(params.get('start') || '1', 10);

    const book = BOOKS[bookId];
    if (!book) {
      document.body.innerHTML = '<p style="color:#fff;padding:40px;font-family:sans-serif">Livre introuvable (book=' + bookId + ')</p>';
      throw new Error('Book not found: ' + bookId);
    }

    /* ── État ── */
    let currentIndex = Math.max(0, book.pages.findIndex(p => p.id === startId));
    let isTransitioning = false;

    /* ── Références DOM ── */
    const elBookTitle    = document.getElementById('book-title');
    const elChapterLabel = document.getElementById('chapter-label');
    const elChapterTitle = document.getElementById('chapter-title');
    const elDescription  = document.getElementById('description');
    const elDots         = document.getElementById('progress-dots');
    const elPageCount    = document.getElementById('page-count');
    const elTapBtn       = document.getElementById('tap-btn');
    const elStartOverlay = document.getElementById('start-overlay');
    const elOverlayTitle = document.getElementById('overlay-title');
    const elEndScreen    = document.getElementById('end-screen');
    const elRestartBtn   = document.getElementById('restart-btn');

    /* ── Init UI statique ── */
    elBookTitle.textContent    = book.title;
    elOverlayTitle.textContent = book.title;
    buildDots();

    function buildDots() {
      elDots.innerHTML = '';
      book.pages.forEach((_, i) => {
        const d = document.createElement('span');
        d.className = 'dot';
        elDots.appendChild(d);
      });
    }

    /* ── Mise à jour de la page affichée ── */
    function applyPage(index, instant = false) {
      const page = book.pages[index];
      const dur  = instant ? 0 : 400;

      const fadeTargets = [elChapterLabel, elChapterTitle, elDescription];

      if (!instant) {
        fadeTargets.forEach(el => { el.style.transition = `opacity ${dur}ms`; el.style.opacity = '0'; });
      }

      setTimeout(() => {
        elChapterLabel.textContent = page.chapter;
        elChapterTitle.textContent = page.title;
        elDescription.textContent  = page.description;
        elPageCount.textContent    = `${index + 1}/${book.pages.length}`;

        // Couleur d'accent
        document.documentElement.style.setProperty('--accent',     page.color);
        document.documentElement.style.setProperty('--accent-dim', page.color + '88');

        // Anneaux
        document.querySelectorAll('.ring').forEach(r => {
          r.style.borderColor = page.color;
        });

        // Dots
        document.querySelectorAll('.dot').forEach((d, i) => {
          d.className = 'dot' + (i === index ? ' active' : (i < index ? ' done' : ''));
        });

        if (!instant) {
          fadeTargets.forEach(el => { el.style.opacity = '1'; });
        }
      }, instant ? 0 : dur);
    }

    /* ── Démarrage (premier tap sur l'overlay) ── */
    elStartOverlay.addEventListener('click', async () => {
      await ambientEngine.crossfadeTo(book.pages[currentIndex].ambiance);
      elStartOverlay.classList.add('hidden');
      document.body.classList.remove('paused');
      document.body.classList.add('playing');
      applyPage(currentIndex, true);
    });

    /* ── Tap principal : page suivante ── */
    elTapBtn.addEventListener('click', async () => {
      if (isTransitioning) return;

      const next = currentIndex + 1;

      if (next >= book.pages.length) {
        // Fin du livre
        ambientEngine.stop(2);
        document.body.classList.remove('playing');
        elEndScreen.classList.add('visible');
        return;
      }

      isTransitioning = true;
      currentIndex = next;

      // Transition visuelle + audio simultanées
      applyPage(currentIndex, false);
      await ambientEngine.crossfadeTo(book.pages[currentIndex].ambiance, 2);

      isTransitioning = false;
    });

    /* ── Restart ── */
    elRestartBtn.addEventListener('click', () => {
      currentIndex = 0;
      elEndScreen.classList.remove('visible');
      applyPage(0, true);
      elStartOverlay.classList.remove('hidden');
      document.body.classList.remove('playing');
      document.body.classList.add('paused');
    });

    /* ── Affichage initial (sans audio) ── */
    applyPage(currentIndex, true);
  </script>
</body>
</html>
